name: Test Arch PKGBUILD

'on':
  push:
    branches: [main, master, develop]
    paths:
      - 'PKGBUILD'
      - 'PKGBUILD.md'
      - 'knol/AUR_SUBMISSION.md'
      - '.github/workflows/test-arch-install.yml'
  pull_request:
    paths:
      - 'PKGBUILD'
      - 'PKGBUILD.md'
      - 'knol/AUR_SUBMISSION.md'
      - '.github/workflows/test-arch-install.yml'

jobs:
  validate-pkgbuild:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    # Default shell in the Arch container is `sh -e`, but `source` and
    # bash array expansions (e.g. ${source_x86_64[@]}) below are
    # bash-only — explicitly opt every `run` step into bash.
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Arch packaging tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel namcap libarchive

      - name: PKGBUILD syntax check
        run: bash -n PKGBUILD

      - name: namcap PKGBUILD (warnings non-fatal)
        run: namcap PKGBUILD || true

      - name: Verify lotion-bin-style PKGBUILD shape
        run: |
          source PKGBUILD
          # lotion-bin pulls the release .deb, not a source tarball.
          # Fail loudly if someone reintroduces a source-build pattern.
          for src in "${source_x86_64[@]}" "${source_aarch64[@]}"; do
            url="${src##*::}"
            case "$url" in
              *.deb) ;;
              *)
                echo "::error::expected .deb in source array, got: $url"
                exit 1
                ;;
            esac
          done
          echo "✓ all sources reference .deb release artifacts"

      - name: Reject npm-build steps in PKGBUILD
        run: |
          # If npm install / npm run sneak back in, the user-facing
          # complaint from #146 (hundreds of npm packages + vulns)
          # comes back too.
          if grep -E '\bnpm (install|ci|run)\b' PKGBUILD; then
            echo "::error::PKGBUILD must not run npm — use the .deb artifact instead"
            exit 1
          fi
          echo "✓ no npm steps in PKGBUILD"

      - name: Documentation references intact
        run: |
          test -f PKGBUILD.md
          test -f knol/AUR_SUBMISSION.md
          test -f README.md
          grep -q 'lotion-bin' PKGBUILD.md
          grep -q 'lotion-bin' knol/AUR_SUBMISSION.md
          echo "✓ docs in place and reference lotion-bin"
